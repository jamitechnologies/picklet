services:
  # API Service
  - type: web
    name: picket-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ID
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: picket-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: picket-db
          property: connectionString

  # Worker Service
  - type: worker
    name: picket-worker
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ID
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: picket-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: picket-db
          property: connectionString

databases:
  - name: picket-db
    plan: free
    databaseName: picket
    user: picket

services:
  - type: redis
    name: picket-redis
    plan: free
    ipAllowList: [] # Allow all internal services
